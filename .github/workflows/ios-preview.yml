name: iOS Preview

# Builds the app on Limrun RBE for every PR push and posts a streamed-simulator
# preview link as a PR comment. Pragmatic build: no teardown / asset cleanup
# (instances and per-commit assets accumulate; reap manually or add a reaper later).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ios-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      LIM_API_KEY: ${{ secrets.LIM_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install lim + bazelisk
        run: npm install -g lim @bazel/bazelisk

      - name: Build on Limrun RBE and upload preview asset
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eo pipefail

          SHA7="${HEAD_SHA:0:7}"
          ASSET="preview/${OWNER}/${REPO}/pr-${PR}-${SHA7}-ios"

          # Bring up the RBE tunnel (tunnel-only; the preview streams from the
          # uploaded asset, not from a simulator attached here). Daemonizes, so
          # the rest of this step shares the same tunnel.
          lim xcode rbe --no-auto-install

          # Build remotely and pull the .ipa to the runner. The generated config
          # sets --remote_download_outputs=minimal; the later flag wins.
          bazelisk --digest_function=sha256 build --config=limrun //App:App \
            --remote_download_outputs=toplevel 2>&1 | tee build.log

          # Locate the .ipa from the build output. This repo's .bazelrc sets
          # --experimental_convenience_symlinks=ignore, so there is no bazel-bin
          # symlink to rely on; the "up-to-date:" line carries the absolute path.
          IPA=$(grep -A1 'up-to-date:' build.log | grep -o '/.*\.ipa' | head -1)
          if [ -z "$IPA" ] || [ ! -f "$IPA" ]; then
            echo "::error::Could not locate the built .ipa" >&2
            exit 1
          fi
          echo "Built: $IPA"

          # Upload as a preview asset. The SHA-suffixed name means each commit is
          # a fresh asset, so we never depend on push overwriting an existing name.
          lim asset push "$IPA" -n "$ASSET" --ttl 720h

          PREVIEW_URL="https://console.limrun.com/preview?asset=${ASSET}&platform=ios&model=iphone"
          echo "PREVIEW_URL=$PREVIEW_URL" >> "$GITHUB_ENV"
          echo "SHA7=$SHA7" >> "$GITHUB_ENV"

      - name: Post preview link on the PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ env.PREVIEW_URL }}
          SHA7: ${{ env.SHA7 }}
        with:
          script: |
            const marker = '<!-- limrun-preview-ios -->';
            const url = process.env.PREVIEW_URL;
            const sha7 = process.env.SHA7;
            const body = [
              '**Limrun Preview**',
              '',
              '| Platform | Commit | Preview |',
              '|---|---|---|',
              '| iOS | `' + sha7 + '` | [Open Preview →](' + url + ') |',
              '',
              'Reviewer must be a member of the organization on Limrun.',
              '',
              marker,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
